[workspace]
authors = ["Andrews Cordolino Sobral <andrewssobral@gmail.com>"]
channels = ["conda-forge"]
name = "bgslibrary"
platforms = ["linux-64", "linux-aarch64", "osx-arm64", "osx-64", "win-64"]
version = "0.1.0"

[tasks]
# Core build tasks
configure = "cmake -S . -B build -G Ninja"
build = "cmake --build build"
clean = "rm -rf build"

# Examples tasks
configure_examples = "cmake -S examples -B examples/build"
build_examples = { cmd = "cmake --build examples/build", depends-on = ["configure_examples"] }
clean_examples = "rm -rf examples/build"

# Combined tasks
rebuild = { cmd = "echo 'Rebuild complete'", depends-on = ["clean", "configure", "build"] }
rebuild_all = { cmd = "echo 'Full rebuild complete'", depends-on = ["clean", "clean_examples", "rebuild", "build_examples"] }

# Run tasks
run = "./build/bgslibrary --use_cam --camera=0"
run_bgs_demo = "./examples/build/bgs_demo"
run_bgs_demo2 = "./examples/build/bgs_demo2"

# Development helpers
install = { cmd = "cmake --install build --prefix .pixi/envs/default", depends-on = ["build"] }

# Python wrapper (pybgs) tasks
configure_python = "cmake -S . -B build_py -G Ninja -DBGS_PYTHON_SUPPORT=ON"
build_python = { cmd = "cmake --build build_py", depends-on = ["configure_python"] }
install_python = { cmd = "cmake --install build_py --prefix .pixi/envs/default", depends-on = ["build_python"] }
clean_python = "rm -rf build_py"

# Golden-master C++ emitter (tests/golden/cpp) — self-contained, does NOT touch the production build
configure_golden_cpp = "cmake -S tests/golden/cpp -B tests/golden/cpp/build -G Ninja"
build_golden_cpp = { cmd = "cmake --build tests/golden/cpp/build", depends-on = ["configure_golden_cpp"] }
clean_golden_cpp = "cmake -E rm -rf tests/golden/cpp/build"

[dependencies]
# Pinned MAJ.MIN so the golden cell-key/baseline (linux-64-opencv4.13, ...) stays stable
# across conda-forge solves — the Phase 0 matrix gates against it (tests/golden/).
opencv = ">=4.13,<4.14"
cmake = ">=4.3.3,<5"
ninja = ">=1.13.2,<2"
compilers = ">=1.11.0,<2"
pkg-config = ">=0.29.2,<0.30"
# Python wrapper (pybgs) dependencies
# Pinned <3.13: Python 3.14 aborts on `import pybgs` on macOS (take_gil: PyMUTEX_LOCK failed,
# seen in the trilha-ii CI matrix). The version doesn't affect golden masks (they come from the
# C++/OpenCV core), so this is safe for the committed baselines.
python = ">=3.10,<3.13"
numpy = ">=1.21"
pip = ">=26.1.1,<27"
