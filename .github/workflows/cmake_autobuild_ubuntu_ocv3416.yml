name: CMake autobuild on Ubuntu + OpenCV 3.4.16

on:
  pull_request:
    branches: [ "master" ]
  # push:
  #   branches: [ "master" ]

env:
  # Customize the CMake build type here (Release, Debug, RelWithDebInfo, etc.)
  BUILD_TYPE: Release

jobs:
  container:
    # The CMake configure and build commands are platform agnostic and should work equally well on Windows or Mac.
    # You can convert this to a matrix build if you need cross-platform coverage.
    # See: https://docs.github.com/en/free-pro-team@latest/actions/learn-github-actions/managing-complex-workflows#using-a-build-matrix
    runs-on: ubuntu-latest
    container: andrewssobral/opencv3:3.4.16

    steps:
    - uses: actions/checkout@v3

    - name: Compile C++ library
      # Configure CMake in a 'build' subdirectory. `CMAKE_BUILD_TYPE` is only required if you are using a single-configuration generator such as make.
      # See https://cmake.org/cmake/help/latest/variable/CMAKE_BUILD_TYPE.html?highlight=cmake_build_type
      # run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}}
      run: cmake -S . -B build && cmake --build build -j $(nproc)

    - name: Build and install the python wrapper
      # Build your program with the given configuration
      # run: cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}}
      run: git config --global --add safe.directory /__w/bgslibrary/bgslibrary && git submodule update --init --recursive && python setup.py build && python setup.py install

    - name: Golden-master regression (Python wrapper)
      # Phase 0 safety net (tests/golden/). Gates on the committed baseline for this
      # (OS, arch, OpenCV) cell; if none is committed yet it generates one (informational),
      # uploaded as the artifact below — download and commit it to turn on the gate.
      run: |
        OCV=3.4.16
        CELL="linux-64-opencv${OCV}"
        # pybgs is importable from the setup.py build output (matches the dockerfiles' PYTHONPATH)
        export PYTHONPATH="$(dirname "$(find "$PWD/build" -name 'pybgs*.so' | head -1)")":$PYTHONPATH
        python -c "import pybgs; print('pybgs', len([n for n in dir(pybgs) if n[0].isupper()]), 'classes')"
        if [ -f "tests/golden/goldens/${CELL}.json" ]; then
          echo "::notice::golden baseline ${CELL} present — checking"
          python tests/golden/golden_test.py --check --opencv "${OCV}"
        else
          echo "::warning::no committed golden for ${CELL}; generating one (informational)"
          python tests/golden/golden_test.py --generate --opencv "${OCV}"
        fi

    - name: Upload golden baseline
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: golden-linux-64-opencv3.4.16
        path: tests/golden/goldens/*.json
        if-no-files-found: ignore

    - name: Compile the C++ QT User Interface
      # Build your program with the given configuration
      # run: cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}}
      run: cd gui/qt/build && cmake .. && make -j $(nproc)

    - name: Compile examples
      # Build your program with the given configuration
      # run: cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}}
      run: cd examples/build && cmake .. && make -j $(nproc)
